<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Sentiment Analyzer Pro</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e54c8;
            --primary-dark: #3a3fa8;
            --secondary: #8f94fb;
            --dark: #1e1e2c;
            --light: #f5f5f7;
            --danger: #ff4757;
            --success: #2ed573;
            --border: #e0e0ef;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1e2c 0%, #2d2d44 40%, #3a3060 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-header .logo-icon {
            font-size: 2.5rem;
        }

        .logo-header h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .logo-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .tabs {
            display: flex;
            background: var(--light);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 1.75rem;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(78, 84, 200, 0.35);
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: #fff;
            color: var(--dark);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .social-btn:hover {
            background: var(--light);
            border-color: var(--primary);
        }

        .social-btn.disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .social-btn i {
            font-size: 1.1rem;
        }

        .google-btn i {
            color: #ea4335;
        }

        .apple-btn i {
            color: #000;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 0.85rem 0.75rem 2.4rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafbff;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(78, 84, 200, 0.12);
            background: #fff;
        }

        .toggle-password {
            position: absolute;
            right: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.78rem;
            margin-top: 0.35rem;
            display: none;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .alert-success {
            background: rgba(46, 213, 115, 0.1);
            color: #1a9e4e;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--primary);
            text-decoration: none;
            margin-top: -0.4rem;
            margin-bottom: 1.2rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(78, 84, 200, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .password-strength {
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            margin-top: 0.4rem;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="logo-header">
            <div class="logo-icon">📊</div>
            <h1>Sentiment Analyzer Pro</h1>
            <p>Unlock the power of AI-driven text insights</p>
        </div>

        <div class="card">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN PANEL -->
            <div class="form-panel active" id="loginPanel">
                <div class="social-login">
                    <button class="social-btn google-btn" id="googleLoginBtn">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                    <button class="social-btn apple-btn disabled" title="Apple Sign-In coming soon" disabled>
                        <i class="fab fa-apple"></i> Continue with Apple <small
                            style="font-weight:400; color:#aaa">(Soon)</small>
                    </button>
                </div>

                <div class="divider">or sign in with email</div>

                <div class="alert alert-error" id="loginAlert"></div>

                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"
                                required>
                        </div>
                        <div class="error-msg" id="loginEmailError">Please enter a valid email.</div>
                    </div>

                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Your password"
                                autocomplete="current-password" required>
                            <button type="button" class="toggle-password"
                                onclick="togglePassword('loginPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-msg" id="loginPasswordError">Password is required.</div>
                    </div>

                    <a href="#" class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        <span class="spinner" id="loginSpinner"></span>
                        <span id="loginBtnText">Sign In</span>
                    </button>
                </form>
            </div>

            <!-- SIGNUP PANEL -->
            <div class="form-panel" id="signupPanel">
                <div class="alert alert-error" id="signupAlert"></div>
                <div class="alert alert-success" id="signupSuccess"></div>

                <form id="signupForm" novalidate>
                    <div class="input-group">
                        <label for="signupName">Full Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signupName" placeholder="John Doe" autocomplete="name" required>
                        </div>
                        <div class="error-msg" id="signupNameError">Name is required.</div>
                    </div>

                    <div class="input-group">
                        <label for="signupEmail">Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"
                                required>
                        </div>
                        <div class="error-msg" id="signupEmailError">Please enter a valid email.</div>
                    </div>

                    <div class="input-group">
                        <label for="signupPassword">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signupPassword" placeholder="At least 8 characters"
                                autocomplete="new-password" required>
                            <button type="button" class="toggle-password"
                                onclick="togglePassword('signupPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="error-msg" id="signupPasswordError">Password must be at least 8 characters.</div>
                    </div>

                    <div class="input-group">
                        <label for="signupConfirm">Confirm Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="signupConfirm" placeholder="Repeat password"
                                autocomplete="new-password" required>
                        </div>
                        <div class="error-msg" id="signupConfirmError">Passwords do not match.</div>
                    </div>

                    <button type="submit" class="btn-submit" id="signupBtn">
                        <span class="spinner" id="signupSpinner"></span>
                        <span id="signupBtnText">Create Account</span>
                    </button>
                </form>
            </div>
        </div><!-- /card -->

        <div class="footer-links">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        // ─── Tab Switching ───────────────────────────────────────────────
        function switchTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
            clearAlerts();
        }

        function clearAlerts() {
            ['loginAlert', 'signupAlert', 'signupSuccess'].forEach(id => {
                const el = document.getElementById(id);
                el.style.display = 'none';
                el.textContent = '';
            });
        }

        function showAlert(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.style.display = 'block';
        }

        // ─── Helpers ─────────────────────────────────────────────────────
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function setLoading(btnId, spinnerId, textId, loading, text) {
            document.getElementById(btnId).disabled = loading;
            document.getElementById(spinnerId).style.display = loading ? 'inline-block' : 'none';
            document.getElementById(textId).textContent = loading ? 'Please wait...' : text;
        }

        function showForgotPassword() {
            alert('Password reset: Please contact support@sentimentpro.com');
        }

        // ─── Password Strength ───────────────────────────────────────────
        document.getElementById('signupPassword').addEventListener('input', function () {
            const val = this.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const bar = document.getElementById('strengthBar');
            const colors = ['#ff4757', '#ffa502', '#2ed573', '#2ed573'];
            bar.style.width = (score * 25) + '%';
            bar.style.background = colors[score - 1] || 'transparent';
        });

        // ─── Google Login ─────────────────────────────────────────────────
        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            window.location.href = `${API_BASE}/auth/google`;
        });

        // ─── Login Form ───────────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !/\S+@\S+\.\S+/.test(email)) {
                document.getElementById('loginEmailError').style.display = 'block';
                return;
            }
            if (!password) {
                document.getElementById('loginPasswordError').style.display = 'block';
                return;
            }

            // Hide inline errors
            document.getElementById('loginEmailError').style.display = 'none';
            document.getElementById('loginPasswordError').style.display = 'none';

            setLoading('loginBtn', 'loginSpinner', 'loginBtnText', true, 'Sign In');

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert('loginAlert', data.error || 'Login failed. Please try again.');
                    return;
                }

                // ✅ Store token and redirect
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } catch (err) {
                showAlert('loginAlert', 'Unable to connect to server. Please check your connection.');
            } finally {
                setLoading('loginBtn', 'loginSpinner', 'loginBtnText', false, 'Sign In');
            }
        });

        // ─── Signup Form ──────────────────────────────────────────────────
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();

            const full_name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            let valid = true;

            if (!full_name) { document.getElementById('signupNameError').style.display = 'block'; valid = false; }
            else document.getElementById('signupNameError').style.display = 'none';

            if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('signupEmailError').style.display = 'block'; valid = false; }
            else document.getElementById('signupEmailError').style.display = 'none';

            if (password.length < 8) { document.getElementById('signupPasswordError').style.display = 'block'; valid = false; }
            else document.getElementById('signupPasswordError').style.display = 'none';

            if (password !== confirm) { document.getElementById('signupConfirmError').style.display = 'block'; valid = false; }
            else document.getElementById('signupConfirmError').style.display = 'none';

            if (!valid) return;

            setLoading('signupBtn', 'signupSpinner', 'signupBtnText', true, 'Create Account');

            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert('signupAlert', data.error || 'Registration failed. Please try again.');
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('signupSuccess', '✅ Account created! Redirecting...');
                document.getElementById('signupSuccess').style.display = 'block';
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch (err) {
                showAlert('signupAlert', 'Unable to connect to server. Please check your connection.');
            } finally {
                setLoading('signupBtn', 'signupSpinner', 'signupBtnText', false, 'Create Account');
            }
        });
    </script>
</body>

</html>
